  var need=fbReady&&(ST_role==="admin"||ST_role==="owner");
  if(need&&!logsListenerOn){
    logsListenerOn=true;
    logsUnsub=fsDB.collection("logs").orderBy("createdAt","desc").onSnapshot(function(snap){
      LOGS_CACHE=snap.docs.map(function(d){var o=d.data();o.id=d.id;return o;});
      checkNewAlerts(LOGS_CACHE);
      if(document.getElementById("MP"))renderPage();
    });
  } else if(!need&&logsListenerOn){
    if(logsUnsub)logsUnsub();
    logsListenerOn=false;LOGS_CACHE=[];
  }
}

/* ── Browser alerts for new red/orange entries (no server/email needed — the
   real email/scheduled-report path needs Cloud Functions, which needs the
   Blaze plan the owner isn't ready to enable yet). Only fires while this tab
   is open with an admin/owner signed in. ── */
var notifSeenInit=false, notifSeenIds=new Set();
function checkNewAlerts(entries){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  if(!notifSeenInit){
    entries.forEach(function(l){if(l.st==="red"||l.st==="orange")notifSeenIds.add(l.id);});
    notifSeenInit=true;return;
  }
  entries.forEach(function(l){
    if((l.st==="red"||l.st==="orange")&&!notifSeenIds.has(l.id)){
      notifSeenIds.add(l.id);
      try{new Notification("⚠️ "+l.sl,{body:l.plate+" · "+(l.driverName||"—")+(l.dev!=null?" · "+(l.dev>=0?"+":"")+pct(l.dev):"")});}catch(e){}
    }
  });
}
function notifBtnHtml(){
  if(!("Notification" in window))return"";
  var on=Notification.permission==="granted";
  return ' <button class="ob" id="btnNotif" title="'+(on?"تنبيهات المتصفح مفعّلة":"فعّل تنبيهات المتصفح")+'">'+(on?"🔔":"🔕")+"</button>";
}
document.addEventListener("click",function(e){
  if(e.target&&e.target.id==="btnNotif"){
    Notification.requestPermission().then(function(){var b=document.getElementById("btnNotif");if(b)b.outerHTML=notifBtnHtml();});
  }
});

/* ── Storage (Firestore + a couple of harmless local-only prefs) ── */
function lg(k){try{return localStorage.getItem("wq_"+k);}catch(e){return null;}}
function ls(k,v){try{localStorage.setItem("wq_"+k,v);return true;}catch(e){return false;}}
function loadLogs(){return LOGS_CACHE;}
function saveLog(entry,photos,cb){
  if(!fbReady||!fsDB){if(cb)cb(false);return;}
  if(ST_role==="driver"&&LOCKDOWN){toast("تسجيل الدخول للسائقين موقوف مؤقتاً من الإدارة","🔒");if(cb)cb(false);return;}
  var ref=fsDB.collection("logs").doc();
  var vRef=fsDB.collection("vehicles").doc(entry.plate);
  /* Meter photos are attached as base64 strings directly in the log doc — same
     free, Blaze-free technique proven with the Iqama photo — no Storage upload
     step, so there's nothing here that can fail and block the actual record. */
  var photoFields={};
  if(photos&&photos.prev)photoFields.photoPrev=photos.prev;
  if(photos&&photos.curr)photoFields.photoCurr=photos.curr;
  var data=Object.assign({},entry,photoFields,{createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  var batch=fsDB.batch();
  batch.set(ref,data);
  batch.set(vRef,{lastCurr:entry.curr,lastDate:entry.date,lastTime:entry.time||"",lastDriverName:entry.driverName||""});
  batch.commit().then(function(){if(cb)cb(true);}).catch(function(e){console.error("saveLog failed:",e);if(cb)cb(false);});
}
function patchLog(e){if(fbReady&&fsDB)fsDB.collection("logs").doc(e.id).update({reviewed:e.reviewed});}

/* ── Utils ── */
function authErr(e){
  var m={
    "auth/invalid-email":"البريد الإلكتروني غير صالح",
    "auth/user-not-found":"الحساب غير موجود",
    "auth/wrong-password":"كلمة المرور غير صحيحة",
    "auth/invalid-credential":"البيانات غير صحيحة",
    "auth/email-already-in-use":"البريد الإلكتروني مستخدم مسبقاً",
    "auth/weak-password":"كلمة المرور ضعيفة جداً (6 أحرف على الأقل)",
    "auth/too-many-requests":"محاولات كثيرة، حاول لاحقاً"
  };
  return m[e.code]||e.message;
}
function fmt(n,d){if(n==null||isNaN(n))return "—";d=d==null?1:d;return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function pct(n,d){if(n==null||isNaN(n))return "—";d=d==null?1:d;return(n*100).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})+"%";}
function toast(m,ic){var el=document.getElementById("T");el.innerHTML="<span>"+(ic||"✅")+"</span><span>"+m+"</span>";el.style.display="flex";clearTimeout(window._tt);window._tt=setTimeout(function(){el.style.display="none";},2500);}
/* Best-effort append-only trail of privileged actions — never blocks the action itself if the write fails */
function logAudit(action,target){
  if(!fsDB)return;
  var actor=(ST_admin&&(ST_admin.n||ST_admin.email))||(CUR_USER&&CUR_USER.email)||"—";
  fsDB.collection("auditLog").add({actor:actor,action:action,target:target||"",createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){});
}
function es(ic,t,s){return '<div class="es"><span class="ei">'+ic+'</span><div class="et">'+t+"</div>"+(s?'<div style="font-size:11px;margin-top:4px">'+s+"</div>":"")+"</div>";}
function calcE(plate,prev,curr,liters){
  var v=FP[plate],ref=RM[v&&v.u],diff=curr-prev,ar=null,dev=null;
  if(diff>0&&liters>0&&ref){if(ref.u==="km"){ar=diff/liters;dev=(ref.t-ar)/ref.t;}else{ar=liters/diff;dev=(ar-ref.t)/ref.t;}}
  var st="gray",sl="—";
  if(dev!=null){var a=Math.abs(dev);if(a<=0.05){st="green";sl="طبيعي";}else if(a<=0.2){st="yellow";sl="انحراف بسيط";}else if(a<=0.4){st="orange";sl="يحتاج مراجعة";}else{st="red";sl="إهدار / خطأ";}}
  return {diff:diff,ar:ar,dev:dev,st:st,sl:sl,ref:ref?ref.t:null,un:ref?ref.u:null};
}

/* An unlocked owner/admin device left unattended (an office, a truck cab) is a
   standing invitation to tamper with rates or delete records — auto sign-out
   after 20 idle minutes closes that window without needing a server. */
var IDLE_LIMIT_MS=20*60*1000, ST_lastActivity=Date.now();
["mousemove","keydown","click","touchstart","scroll"].forEach(function(ev){
  document.addEventListener(ev,function(){ST_lastActivity=Date.now();},{passive:true});
});
setInterval(function(){
  if((ST_role==="owner"||ST_role==="admin")&&Date.now()-ST_lastActivity>IDLE_LIMIT_MS){
    toast("تم تسجيل الخروج تلقائياً بسبب عدم النشاط","🔒");
    goLogout();
  }
},60000);

/* ── Auth (Firebase email/password) ── */
function rAuth(){
  var el=document.getElementById("A"),isOw=ST_target==="owner";
  el.innerHTML='<div class="gate"><div class="gc"><div class="ac">'+
    '<div class="at">'+(isOw?"دخول المالك":"دخول المشرف")+'</div>'+
    '<div class="as">أدخل بريدك الإلكتروني وكلمة المرور.</div>'+
    '<div class="fl"><label>البريد الإلكتروني</label><input type="email" id="iEm" placeholder="name@example.com" autocomplete="username"></div>'+
    '<div class="fl"><label>كلمة المرور</label><input type="password" id="iP" autocomplete="current-password"></div>'+
    '<div class="ae" id="iE"></div>'+
    '<button class="sb" id="btnGo">دخول →</button>'+
    '<button style="background:none;border:none;color:var(--dm);font-size:11.5px;cursor:pointer;margin-top:9px;width:100%" id="btnForgot">نسيت كلمة المرور؟</button>'+
    '<button class="bk" onclick="goBack()">رجوع</button>'+
    '</div></div></div>';
  function go(){
    var errEl=document.getElementById("iE");errEl.textContent="";
    var email=(document.getElementById("iEm").value||"").trim();
    var pass=document.getElementById("iP").value||"";
    if(!email){errEl.textContent="❌ الرجاء إدخال البريد الإلكتروني";return;}
    if(!pass){errEl.textContent="❌ الرجاء إدخال كلمة المرور";return;}
    var btn=document.getElementById("btnGo");btn.disabled=true;
    firebase.auth().signInWithEmailAndPassword(email,pass).then(function(cred){
      return fsDB.collection("admins").doc(cred.user.uid).get().then(function(doc){
        if(!doc.exists){errEl.textContent="❌ هذا الحساب غير مسجل كمشرف";firebase.auth().signOut();btn.disabled=false;return;}
        var d=doc.data();
        if(isOw&&!d.isOwner){errEl.textContent="❌ هذا الحساب ليس بصلاحية المالك";firebase.auth().signOut();btn.disabled=false;return;}
        ST_admin={id:cred.user.uid,n:d.name,email:d.email,isOwner:!!d.isOwner};
        ST_role=ST_admin.isOwner?"owner":"admin";ST_page="dash";
        toast("أهلاً "+d.name,"✅");render();
      });
    }).catch(function(e){errEl.textContent="❌ "+authErr(e);btn.disabled=false;});
  }
  document.getElementById("btnGo").onclick=go;
  document.getElementById("iP").addEventListener("keydown",function(e){if(e.key==="Enter")go();});
  document.getElementById("btnForgot").onclick=function(){
    var email=(document.getElementById("iEm").value||"").trim();
    var errEl=document.getElementById("iE");
    if(!email){errEl.textContent="❌ أدخل بريدك الإلكتروني أولاً";return;}
    firebase.auth().sendPasswordResetEmail(email).then(function(){
      toast("أُرسل رابط إعادة التعيين إلى بريدك","📧");
    }).catch(function(e){errEl.textContent="❌ "+authErr(e);});
  };
}

/* ── Lightweight inline-SVG charts (no charting library — a few hundred bytes vs. hundreds of KB) ── */
function svgTrendChart(points){
  var w=600,h=150,pad=8,padB=18;
  var ys=points.map(function(p){return p.y;});
  var minY=Math.min.apply(null,ys.concat([0])),maxY=Math.max.apply(null,ys.concat([0.01]));
  if(maxY===minY)maxY+=1;
  var n=points.length,xStep=n>1?(w-pad*2)/(n-1):0;
  function px(i){return pad+i*xStep;}
  function py(v){return h-padB-((v-minY)/(maxY-minY))*(h-pad-padB);}
  var path="",area="";
  for(var i=0;i<n;i++){var cmd=(i===0?"M":"L")+px(i).toFixed(1)+","+py(points[i].y).toFixed(1)+" ";path+=cmd;}
  area=path+"L"+px(n-1).toFixed(1)+","+(h-padB)+" L"+px(0).toFixed(1)+","+(h-padB)+" Z";
  var zeroY=py(0).toFixed(1);
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:140px;display:block" preserveAspectRatio="none">'+
    '<line x1="'+pad+'" y1="'+zeroY+'" x2="'+(w-pad)+'" y2="'+zeroY+'" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>'+
    '<path d="'+area+'" fill="rgba(232,163,61,.10)" stroke="none"/>'+
    '<path d="'+path+'" fill="none" stroke="#e8a33d" stroke-width="2"/>'+
    '</svg>';
  return svg;
}
function trendData(logs){
  var today=new Date(),days=[];
  for(var i=29;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  var byDate={};
  logs.forEach(function(l){if(l.dev==null)return;if(!byDate[l.date])byDate[l.date]=[];byDate[l.date].push(l.dev);});
  return days.map(function(d,i){var arr=byDate[d];var avg=arr&&arr.length?arr.reduce(function(a,b){return a+b;},0)/arr.length:0;return{x:i,y:avg};});
}
function statusBarChart(logs){

function agg(logs){

  }

}

function parseCsv(text){
  var rows=[],row=[],field="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){
      if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}
      else field+=c;
    }else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(field);field="";}
      else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(field);field="";rows.push(row);row=[];}
      else field+=c;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(function(r){return r.length>1||(r.length===1&&r[0].trim()!=="");});
}

/* ── Document expiry (insurance / istimara / TUV) ── */
function pDocs(){
  var today=new Date();
  var rows=[];
  Object.keys(DOC_EXP).forEach(function(p){
    var d=DOC_EXP[p];
    ["ins","ist","tuv"].forEach(function(k){
      if(!d[k])return;
      var exp=new Date(d[k]);
      var days=Math.round((exp-today)/86400000);
      if(days<=60)rows.push({p:p,k:k,date:d[k],days:days});
    });
  });
  rows.sort(function(a,b){return a.days-b.days;});
  var labels={ins:"التأمين",ist:"الاستمارة",tuv:"الفحص الدوري (TUV)"};
  var r='<div class="ph"><h1>📄 الوثائق</h1><p>'+rows.length+' وثيقة منتهية أو قربت تنتهي (خلال 60 يوم).</p></div><div class="card" style="padding:0"><div class="tw" style="max-height:520px;overflow-y:auto"><table><thead><tr><th>اللوحة</th><th>الوثيقة</th><th>تاريخ الانتهاء</th><th>الحالة</th></tr></thead><tbody>';
  if(!rows.length)r+="<tr><td colspan='4'>"+es("✅","لا توجد وثائق منتهية أو قريبة الانتهاء","")+"</td></tr>";
  else for(var i=0;i<rows.length;i++){var row=rows[i];var st=row.days<0?"red":row.days<=14?"orange":"yellow";var label=row.days<0?"منتهي منذ "+Math.abs(row.days)+" يوم":"باقي "+row.days+" يوم";r+="<tr><td class='num'>"+row.p+"</td><td>"+labels[row.k]+"</td><td class='num'>"+row.date+"</td><td><span class='bg "+st+"'>"+label+"</span></td></tr>";}
  r+="</tbody></table></div></div>";
  return r;
}
function locSummary(logs){
  var byL={};
  for(var i=0;i<logs.length;i++){var l=logs[i],v=FP[l.plate],loc=(v&&v.l)||"غير محدد",price=fuelPriceForPlate(l.plate);
    if(!byL[loc])byL[loc]={tot:0,devs:[],n:0,wc:0};
    byL[loc].tot+=l.liters||0;
    if(l.dev!=null){byL[loc].devs.push(l.dev);if(l.dev>0)byL[loc].wc+=(l.liters||0)*l.dev*price;}
    byL[loc].n++;
  }
  return Object.keys(byL).map(function(loc){var g=byL[loc];var avg=g.devs.length?g.devs.reduce(function(a,b){return a+b;},0)/g.devs.length:null;return{loc:loc,tot:g.tot,n:g.n,avg:avg,wc:g.wc};}).sort(function(a,b){return b.wc-a.wc;});
}
function locSummaryHtml(logs){
  var rows=locSummary(logs);
  if(!rows.length)return es("📍","لا بيانات كافية بعد","");
  var h='<div class="tw"><table><thead><tr><th>الموقع</th><th>عدد العمليات</th><th>إجمالي اللترات</th><th>متوسط الانحراف</th><th>قيمة الإهدار التقديرية</th></tr></thead><tbody>';
  for(var i=0;i<rows.length;i++){var r=rows[i];var c=r.avg!=null&&Math.abs(r.avg)>0.2?"var(--rd)":r.avg!=null&&Math.abs(r.avg)>0.05?"var(--og)":"var(--tl)";
    h+='<tr><td><b>'+r.loc+'</b></td><td class="num">'+r.n+'</td><td class="num">'+fmt(r.tot,0)+'</td><td class="num" style="color:'+c+'">'+(r.avg!=null?(r.avg>=0?"+":"")+pct(r.avg):"—")+'</td><td class="num" style="font-weight:800">'+fmt(r.wc,0)+' ريال</td></tr>';}
  h+='</tbody></table></div>';
  return h;
}

/* ── DRIVER MODE ── */
function rDriver(){
  document.getElementById("A").innerHTML=tb()+'<div class="dw" id="DP"></div>';
  if(!ST_opName){rOpG();return;}
  checkDriverIdOnFile(ST_opName);
}
/* Every driver name must have an Iqama photo on file before they can log fuel —
   checked on every entry to the driver flow (not just first selection), since a
   restored session (ST_opName from localStorage) skips rOpG() entirely. Once a
   photo exists, this is a single cheap doc read; capture only runs once ever. */
/* Owner may restrict a driver name to a specific list of plates
   (driverAssignments/{name}) — fetched once right before the fuel-entry form
   opens, never on every keystroke. No assignment doc means unrestricted. */
function enterFuelFlow(name){
  checkMultiDevice(name);
  if(!fsDB){ST_assignedPlates=null;rDE();return;}
  fsDB.collection("driverAssignments").doc(name).get().then(function(doc){
    ST_assignedPlates=doc.exists&&doc.data().plates&&doc.data().plates.length?doc.data().plates:null;
    rDE();
  }).catch(function(){ST_assignedPlates=null;rDE();});
}
/* A persistent per-browser device id (not tied to auth, since drivers are
   anonymous) — lets the owner spot a name being used from more than one
   device within a short window, a common sign of a shared/leaked login. */
function getDeviceId(){
  var k="wq_device_id";
  try{
    var id=localStorage.getItem(k);
    if(!id){id="d"+Date.now().toString(36)+Math.random().toString(36).slice(2,10);localStorage.setItem(k,id);}
    return id;
  }catch(e){return "d"+Math.random().toString(36).slice(2,10);}
}
var DEVICE_ID=getDeviceId();
function checkMultiDevice(name){
  if(!fsDB)return;
  var ref=fsDB.collection("driverSessions").doc(name);
  ref.get().then(function(doc){
    var alert=false;
    if(doc.exists){
      var d=doc.data(),lastAt=d.at&&d.at.toDate?d.at.toDate().getTime():0;
      if(d.deviceId&&d.deviceId!==DEVICE_ID&&(Date.now()-lastAt)<10*60*1000)alert=true;
    }
    ref.set({deviceId:DEVICE_ID,driverName:name,alert:alert,at:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){});
  }).catch(function(){});
}
function checkDriverIdOnFile(name){
  var p=document.getElementById("DP");
  if(p)p.innerHTML='<div class="dc"><div class="dt">جارٍ التحقق...</div></div>';
  if(!fsDB){enterFuelFlow(name);return;}
  /* Checked against a lightweight flag doc, not driverIds itself — a driver's
     client is only ever allowed to know THAT a photo exists, never read the
     photo back (that stays admin/owner-only). */
  fsDB.collection("driverIdFlags").doc(name).get().then(function(doc){
    if(!document.getElementById("DP"))return;
    if(doc.exists)renderPinCheck(name);else renderIdCapture(name);
  }).catch(function(){if(document.getElementById("DP"))renderIdCapture(name);});
}
/* PIN is verified without ever letting a driver's client read the correct PIN
   back: the client "guesses" by writing that guess into a scratch field, and a
   Firestore rule only allows the write to succeed if the guess equals the
   stored pin. A permission-denied error IS the "wrong PIN" signal. */
function renderPinCheck(name){
  var p=document.getElementById("DP");if(!p)return;
  p.innerHTML='<div class="dc"><div class="dt">🔒 رمز الدخول</div>'+
    '<div class="ds">أدخل رمزك المكوّن من ٤ أرقام للمتابعة باسم "'+name+'".</div>'+
    '<div class="fl vp"><label>الرمز</label><input type="tel" inputmode="numeric" maxlength="4" id="pinI" placeholder="••••" autocomplete="off" autofocus style="letter-spacing:8px;font-size:20px;text-align:center"></div>'+
    '<div style="color:var(--rd);font-size:12px;margin-bottom:9px" id="pinE"></div>'+
    '<button class="sb" id="btnPinGo">دخول →</button>'+
    '</div>';
  var attempts=0;
  function go(){
    var v=(document.getElementById("pinI").value||"").trim();
    var err=document.getElementById("pinE");err.textContent="";
    if(!/^[0-9]{4}$/.test(v)){err.textContent="أدخل ٤ أرقام";return;}
    var btn=document.getElementById("btnPinGo");btn.disabled=true;
    fsDB.collection("driverIds").doc(name).update({pinCheck:v}).then(function(){
      enterFuelFlow(name);
    }).catch(function(){
      attempts++;
      err.textContent=attempts>=3?"رمز خاطئ عدة مرات — تواصل مع المشرف إذا نسيت رمزك":"رمز خاطئ، حاول مرة ثانية";
      btn.disabled=false;
    });
  }
  document.getElementById("btnPinGo").onclick=go;
  document.getElementById("pinI").addEventListener("keydown",function(e){if(e.key==="Enter")go();});
}
function renderIdCapture(name){
  var p=document.getElementById("DP");if(!p)return;
  p.innerHTML='<div class="dc"><div class="dt">📷 تصوير الإقامة وإنشاء رمز الدخول</div>'+
    '<div class="ds">أول مرة تسجّل باسم "'+name+'" — لازم تصوّر إقامتك وتنشئ رمز دخول من ٤ أرقام، مرة وحدة فقط.</div>'+
    '<video id="idVid" autoplay playsinline style="width:100%;max-width:340px;border-radius:12px;border:2px solid var(--amb);margin:10px auto;display:block"></video>'+
    '<canvas id="idCanvas" style="display:none"></canvas>'+
    '<div class="fr"><div class="fl"><label>أنشئ رمز دخول (٤ أرقام)</label><input type="tel" inputmode="numeric" maxlength="4" id="idPin1" placeholder="••••" autocomplete="off" style="letter-spacing:6px;text-align:center"></div>'+
    '<div class="fl"><label>أعد كتابة الرمز</label><input type="tel" inputmode="numeric" maxlength="4" id="idPin2" placeholder="••••" autocomplete="off" style="letter-spacing:6px;text-align:center"></div></div>'+
    '<div id="idMsg" style="text-align:center;font-size:12.5px;color:var(--dm);margin-bottom:10px"></div>'+
    '<button class="sb" id="btnIdCap">📸 التقاط وحفظ</button>'+
    '</div>';
  var stream=null;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false}).then(function(s){
    stream=s;var vid=document.getElementById("idVid");if(vid)vid.srcObject=s;
  }).catch(function(){
    var m=document.getElementById("idMsg");if(m)m.innerHTML='<span style="color:var(--rd)">❌ تعذّر الوصول للكاميرا — تأكد من صلاحية الكاميرا بالمتصفح وحاول مرة ثانية</span>';
  });
  var btn=document.getElementById("btnIdCap");
  if(btn)btn.onclick=function(){
    var msg=document.getElementById("idMsg");
    var pin1=(document.getElementById("idPin1").value||"").trim();
    var pin2=(document.getElementById("idPin2").value||"").trim();
    if(!/^[0-9]{4}$/.test(pin1)){msg.innerHTML='<span style="color:var(--rd)">❌ الرمز لازم يكون ٤ أرقام</span>';return;}
    if(pin1!==pin2){msg.innerHTML='<span style="color:var(--rd)">❌ الرمزان غير متطابقين</span>';return;}
    var canvas;
    try{
      var vid=document.getElementById("idVid");canvas=document.getElementById("idCanvas");
      if(!vid.videoWidth||!vid.videoHeight){msg.innerHTML='<span style="color:var(--og)">⏳ الكاميرا لسا ما جهزت — حاول مرة ثانية</span>';return;}
      canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
      canvas.getContext("2d").drawImage(vid,0,0,canvas.width,canvas.height);
    }catch(e){console.error("Iqama capture failed:",e);msg.innerHTML='<span style="color:var(--rd)">❌ تعذّر التقاط الصورة — حاول مرة ثانية</span>';return;}
    btn.disabled=true;msg.textContent="⏳ جارٍ الحفظ...";
    compressCanvasToDataURL(canvas,900,0.6,function(dataUrl){
      if(!dataUrl){msg.innerHTML='<span style="color:var(--rd)">❌ تعذّر معالجة الصورة — حاول مرة ثانية</span>';btn.disabled=false;return;}
      var batch=fsDB.batch();
      batch.set(fsDB.collection("driverIds").doc(name),{name:name,photo:dataUrl,pin:pin1,capturedAt:firebase.firestore.FieldValue.serverTimestamp()});
      batch.set(fsDB.collection("driverIdFlags").doc(name),{done:true});
      batch.commit().then(function(){
        if(stream)stream.getTracks().forEach(function(t){t.stop();});
        toast("تم حفظ الإقامة والرمز","✅");
        enterFuelFlow(name);
      }).catch(function(){msg.innerHTML='<span style="color:var(--rd)">❌ تعذّر الحفظ — تأكد من الاتصال وحاول مرة ثانية</span>';btn.disabled=false;});
    });
  };
}
function rOpG(){
  var p=document.getElementById("DP");if(!p)return;

  p.innerHTML='<div class="dc"><div class="dt">من أنت؟</div><div class="ds">'+(hasDrivers?"اختر اسمك من القائمة.":"اسمك يُسجَّل مع كل عملية.")+'</div>'+

function camBtn(fieldId){

}
function openCamera(fieldId){
  var modal=document.createElement("div");
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;";
  modal.innerHTML='<div style="color:#fff;font-size:14px;font-weight:700">وجّه الكاميرا نحو العداد</div>'+
    '<video id="camVid" autoplay playsinline style="max-width:340px;width:100%;border-radius:12px;border:2px solid var(--amb)"></video>'+
    '<div style="display:flex;gap:12px">'+
    '<button id="btnCap" style="padding:12px 28px;border-radius:10px;background:var(--amb);color:#1a1208;font-weight:800;font-size:15px;border:none;cursor:pointer">📸 التقاط</button>'+
    '<button id="btnCamClose" style="padding:12px 20px;border-radius:10px;background:var(--p2);color:var(--dm);font-size:14px;border:1px solid var(--brd);cursor:pointer">إلغاء</button>'+
    '</div>'+
    '<canvas id="camCanvas" style="display:none"></canvas>'+
    '<div id="camResult" style="color:var(--tl);font-size:13px;text-align:center;max-width:300px"></div>';
  document.body.appendChild(modal);
  var stream=null;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false}).then(function(s){
    stream=s;document.getElementById("camVid").srcObject=s;
  }).catch(function(){
    document.getElementById("camResult").innerHTML='<span style="color:var(--rd)">❌ تعذّر الوصول للكاميرا — أدخل القراءة يدوياً</span>';
  });
  function close(){if(stream)stream.getTracks().forEach(function(t){t.stop();});modal.remove();}
  document.getElementById("btnCamClose").onclick=close;
  document.getElementById("btnCap").onclick=function(){
    var res=document.getElementById("camResult");
    var ocrCanvas;
    try{
      var vid=document.getElementById("camVid");
      var canvas=document.getElementById("camCanvas");
      if(!vid.videoWidth||!vid.videoHeight){
        res.innerHTML='<span style="color:var(--og)">⏳ الكاميرا لسا ما جهزت — انتظر ثانية وحاول مرة ثانية</span>';
        return;
      }
      canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
      canvas.getContext("2d").drawImage(vid,0,0,canvas.width,canvas.height);
      /* Clone before OCR preprocessing mutates the canvas — the attached photo should stay a normal color image */
      ocrCanvas=document.createElement("canvas");
      ocrCanvas.width=canvas.width;ocrCanvas.height=canvas.height;
      ocrCanvas.getContext("2d").drawImage(canvas,0,0);
      compressCanvasToDataURL(canvas,700,0.5,function(dataUrl){if(dataUrl)ST_capturedPhotos[fieldId]=dataUrl;},300000);
    }catch(e){
      console.error("Camera capture failed:",e);
      res.innerHTML='<span style="color:var(--rd)">❌ تعذّر التقاط الصورة — أدخل الرقم يدوياً</span>';
      return;
    }
    res.innerHTML="⏳ جارٍ تحميل أداة القراءة (أول مرة فقط، بعدها تكون محفوظة بجهازك)... <button id=\"btnSkipOcr\" style=\"display:block;margin:8px auto 0;background:none;border:none;color:var(--dm);text-decoration:underline;cursor:pointer;font-size:12px\">تخطي وإدخال يدوي</button>";
    var skipped=false;
    var skipBtn=document.getElementById("btnSkipOcr");
    if(skipBtn)skipBtn.onclick=function(){skipped=true;res.innerHTML='<span style="color:var(--dm)">أدخل الرقم يدوياً بالحقل، ثم أغلق هذه النافذة.</span>';};
    loadTesseract(function(failed){
      if(skipped)return;
      if(failed){res.innerHTML='<span style="color:var(--rd)">❌ تعذّر تحميل أداة القراءة — تأكد من الاتصال، أو أدخل الرقم يدوياً</span>';return;}
      res.innerHTML="🔍 جارٍ قراءة الأرقام...";
      extractNumber(ocrCanvas,function(num){
        if(skipped)return;
        if(num){
          res.innerHTML='<b style="color:var(--tl);font-size:18px">'+num+'</b><br><button id="btnAccept" style="margin-top:8px;padding:8px 20px;border-radius:8px;background:var(--tl);color:#06231d;border:none;cursor:pointer;font-weight:700">✅ استخدام هذا الرقم</button>';
          document.getElementById("btnAccept").onclick=function(){
            var inp=document.getElementById(fieldId);
            if(inp){inp.value=num;inp.dispatchEvent(new Event("input"));}
            close();
          };
        } else {
          res.innerHTML='<span style="color:var(--dm)">لم يتم التعرف على رقم بوضوح — قرّب الكاميرا وتأكد من الإضاءة، أو أدخل الرقم يدوياً.</span>';
        }
      });
    });
  };
}
/* OCR loads lazily — only downloaded the first time a driver actually uses the camera reader */
var tesseractLoading=null;
function loadTesseract(cb){
  if(window.Tesseract){cb(false);return;}
  if(tesseractLoading){tesseractLoading.push(cb);return;}
  tesseractLoading=[cb];
  var done=false;
  var timer=setTimeout(function(){
    if(done)return;done=true;
    var cbs=tesseractLoading;tesseractLoading=null;
    cbs.forEach(function(f){f(true);});
  },20000);
  var s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
  s.onload=function(){
    if(done)return;done=true;clearTimeout(timer);
    var cbs=tesseractLoading;tesseractLoading=null;cbs.forEach(function(f){f(false);});
  };
  s.onerror=function(){
    if(done)return;done=true;clearTimeout(timer);
    var cbs=tesseractLoading;tesseractLoading=null;cbs.forEach(function(f){f(true);});
  };
  document.head.appendChild(s);
}
/* Binarizes the frame (grayscale + Otsu threshold) — the standard fix for
   digit-display OCR accuracy, since raw camera frames have uneven lighting
   that confuses Tesseract far more than the digit shapes themselves do. */
/* Downscale + JPEG-compress the captured frame before it's ever attached to a
   log entry — a raw camera frame can be several MB, this keeps it well under
   200KB while staying clear enough to verify a meter reading. */
function compressCanvasToBlob(canvas,cb){
  try{
    var maxDim=1000;
    var w=canvas.width,h=canvas.height;
    var scale=Math.min(1,maxDim/Math.max(w,h));
    var outW=Math.max(1,Math.round(w*scale)),outH=Math.max(1,Math.round(h*scale));
    var out=document.createElement("canvas");
    out.width=outW;out.height=outH;
    out.getContext("2d").drawImage(canvas,0,0,outW,outH);
    out.toBlob(function(blob){cb(blob);},"image/jpeg",0.7);
  }catch(e){console.error("compressCanvasToBlob failed:",e);cb(null);}
}
/* Photos are stored as a base64 string directly inside the Firestore doc (no
   Firebase Storage / Blaze plan needed) — squeezed under maxBytes so the
   base64-inflated size stays safely below Firestore's 1MB document limit.
   Default budget assumes a SINGLE photo shares the doc (Iqama); callers that
   can attach two photos to one doc (prev+curr meter shots) must pass a
   tighter maxBytes so both fit together. */
function compressCanvasToDataURL(canvas,maxDim,quality,cb,maxBytes){
  maxBytes=maxBytes||900000;
  var softLimit=Math.round(maxBytes*0.78);
  try{
    var w=canvas.width,h=canvas.height;
    var scale=Math.min(1,maxDim/Math.max(w,h));
    var outW=Math.max(1,Math.round(w*scale)),outH=Math.max(1,Math.round(h*scale));
    var out=document.createElement("canvas");
    out.width=outW;out.height=outH;
    out.getContext("2d").drawImage(canvas,0,0,outW,outH);
    var q=quality,url=out.toDataURL("image/jpeg",q),attempts=0;
    while(url.length>softLimit&&attempts<5){q=q*0.7;url=out.toDataURL("image/jpeg",q);attempts++;}
    cb(url.length<=maxBytes?url:null);
  }catch(e){console.error("compressCanvasToDataURL failed:",e);cb(null);}
}
function preprocessForOCR(canvas){
  var ctx=canvas.getContext("2d");
  var w=canvas.width,h=canvas.height;
  var imgData=ctx.getImageData(0,0,w,h);
  var data=imgData.data;
  var n=w*h;
  var gray=new Uint8ClampedArray(n);
  var hist=new Array(256).fill(0);
  for(var i=0;i<n;i++){
    var g=Math.round(0.299*data[i*4]+0.587*data[i*4+1]+0.114*data[i*4+2]);
    gray[i]=g;hist[g]++;
  }
  var sum=0;for(var t=0;t<256;t++)sum+=t*hist[t];
  var sumB=0,wB=0,wF=0,maxVar=0,threshold=127;
  for(var t2=0;t2<256;t2++){
    wB+=hist[t2];if(wB===0)continue;
    wF=n-wB;if(wF===0)break;
    sumB+=t2*hist[t2];
    var mB=sumB/wB,mF=(sum-sumB)/wF;
    var varBetween=wB*wF*(mB-mF)*(mB-mF);
    if(varBetween>maxVar){maxVar=varBetween;threshold=t2;}
  }
  for(var j=0;j<n;j++){
    var v=gray[j]>threshold?255:0;
    data[j*4]=data[j*4+1]=data[j*4+2]=v;
  }
  ctx.putImageData(imgData,0,0);
}
function extractNumber(canvas,cb){
  var done=false;
  var timer=setTimeout(function(){if(done)return;done=true;cb(null);},25000);
  try{
    preprocessForOCR(canvas);
    Tesseract.createWorker("eng").then(function(worker){
      return worker.setParameters({tessedit_char_whitelist:"0123456789",tessedit_pageseg_mode:"7"})
        .then(function(){return worker.recognize(canvas);})
        .then(function(result){
          worker.terminate();
          if(done)return;done=true;clearTimeout(timer);
          var text=(result&&result.data&&result.data.text)||"";
          var digits=text.replace(/[^0-9]/g,"");
          cb(digits.length>=1&&digits.length<=8?digits:null);
        }).catch(function(e){
          worker.terminate();
          throw e;
        });
    }).catch(function(e){
      if(done)return;done=true;clearTimeout(timer);
      console.error("OCR recognize failed:",e);
      cb(null);
    });
  }catch(e){
    if(done)return;done=true;clearTimeout(timer);
    console.error("OCR exception:",e);
    cb(null);
  }
}

function rDE(){
  var dp=document.getElementById("DP");if(!dp)return;
  var v=ST_selV,ref=v?RM[v.u]:null,lRv=(v&&ST_lastReading)?ST_lastReading.lastCurr:null;
  var recent="";

    recent='<div class="dc"><div class="dt" style="font-size:13px">آخر قراءة مسجلة لهذه المركبة</div>'+
      '<div class="rii"><div><div class="num" style="font-weight:700;font-size:12px">'+ST_lastReading.lastDate+" "+(ST_lastReading.lastTime||"")+'</div><div style="font-size:10.5px;color:var(--dm)">'+(ST_lastReading.lastDriverName||"—")+'</div></div>'+
      '<div class="num" style="font-weight:700;font-size:13px">'+fmt(ST_lastReading.lastCurr,0)+"</div></div></div>";
  }
  dp.innerHTML='<div class="dc"><div class="dt">تسجيل تعبئة وقود</div>'+
    '<div class="obar"><span style="font-size:12.5px;color:var(--dm)">👤 <b style="color:var(--tx)">'+ST_opName+'</b></span>'+
    '<button style="font-size:11px;padding:5px 9px;border-radius:6px;background:var(--p2);border:1px solid var(--brd);color:var(--dm);cursor:pointer" onclick="goChOp()">تغيير</button></div>'+
    '<div class="fl vp"><label>رقم اللوحة</label><input type="text" id="pS" placeholder="اكتب للبحث..." autocomplete="off" value="'+(v?v.p:"")+'">'+
    '<div class="vrs" id="vR"></div></div>'+
    (v?'<div class="vc"><div style="font-size:22px">'+(ref&&ref.u==="hr"?"🚜":"🚗")+'</div><div><div class="vpl">'+v.p+'</div><div class="vds">'+v.u+" · "+(v.m||"")+" · "+(v.l||"")+"</div></div></div>":"")+
    (v?
    '<div class="fr">'+
    '<div class="fl"><label>القراءة السابقة ('+(ref&&ref.u==="hr"?"ساعة":"كم")+') '+camBtn("iPr")+'</label><input type="number" id="iPr" value="'+(lRv!=null?lRv:"")+'" placeholder="'+(lRv!=null?lRv:"أدخل القراءة")+'"></div>'+
    '<div class="fl"><label>القراءة الحالية '+camBtn("iCr")+'</label><input type="number" id="iCr" placeholder="القراءة الآن"></div></div>'+
    '<div class="fr">'+
    '<div class="fl"><label>الوقود (لتر)</label><input type="number" id="iL" placeholder="مثال: 65"></div>'+
    (STATIONS_CACHE.length?
      '<div class="fl"><label>المحطة</label><select id="iSt"><option value="">اختر محطة</option>'+STATIONS_CACHE.map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join("")+'<option value="__other__">أخرى (اكتب يدوياً)</option></select><input type="text" id="iStOther" placeholder="اسم المحطة" style="display:none;margin-top:6px"></div>'
      :'<div class="fl"><label>المحطة / الموقع</label><input type="text" id="iSt" placeholder="اسم المحطة"></div>')+
    "</div>"+
    '<div class="fl"><label>ملاحظات (اختياري)</label><textarea id="iNo" rows="2" placeholder="أي ملاحظة..."></textarea></div>'+
    '<button class="sb" id="btnSb">✅ تسجيل العملية</button><div id="rA"></div>'
    :'<div class="es"><span class="ei">🔍</span><div class="et">ابحث عن مركبتك</div></div>')+
    "</div>"+recent;

  /* Camera buttons */
  document.querySelectorAll(".cam-btn").forEach(function(btn){
    btn.addEventListener("click",function(){openCamera(this.dataset.field);});
  });

  /* Approved-station select — reveal free-text fallback for "أخرى" */
  var stSel=document.getElementById("iSt");
  if(stSel&&stSel.tagName==="SELECT"){
    stSel.onchange=function(){
      var o=document.getElementById("iStOther");
      if(o)o.style.display=this.value==="__other__"?"block":"none";
    };
  }

  /* Plate search */
  var psi=document.getElementById("pS");
  if(psi){
    psi.oninput=function(){
      var q=this.value.trim(),rb=document.getElementById("vR");if(!rb)return;
      if(!q){rb.style.display="none";return;}
      var matches=[];for(var i=0;i<AF.length&&matches.length<25;i++){if(AF[i].p.includes(q)&&(!ST_assignedPlates||ST_assignedPlates.indexOf(AF[i].p)>=0))matches.push(AF[i]);}
      if(!matches.length){rb.innerHTML='<div class="vr">'+(ST_assignedPlates?"لا نتائج ضمن مركباتك المخصصة":"لا نتائج")+'</div>';rb.style.display="block";return;}
      var h="";for(var i=0;i<matches.length;i++){h+='<div class="vr" data-pvp="'+matches[i].p+'"><b>'+matches[i].p+'</b><span>'+matches[i].u+" · "+(matches[i].m||"")+"</span></div>";}
      rb.innerHTML=h;rb.style.display="block";
      rb.querySelectorAll("[data-pvp]").forEach(function(el){el.addEventListener("click",function(){
        var picked=FP[this.dataset.pvp];
        ST_selV=picked;ST_lastReading=null;rb.style.display="none";render();
        if(fsDB){fsDB.collection("vehicles").doc(picked.p).get().then(function(doc){
          if(ST_selV===picked){ST_lastReading=doc.exists?doc.data():null;render();}
        });}
      });});
    };
    psi.addEventListener("focus",function(){if(this.value.trim())this.dispatchEvent(new Event("input"));});
  }
  document.addEventListener("click",function(e){if(!e.target.closest(".vp")&&!e.target.closest(".cam-btn")){var r=document.getElementById("vR");if(r)r.style.display="none";}},{once:true});

  /* Submit */
  var sb=document.getElementById("btnSb");
  if(sb&&v){sb.onclick=function(){
    var prev=parseFloat((document.getElementById("iPr")||{value:""}).value);
    var curr=parseFloat((document.getElementById("iCr")||{value:""}).value);
    var liters=parseFloat((document.getElementById("iL")||{value:""}).value);
    var station=(document.getElementById("iSt")||{value:""}).value;
    if(station==="__other__")station=(document.getElementById("iStOther")||{value:""}).value;
    var notes=(document.getElementById("iNo")||{value:""}).value;
    if(isNaN(prev)||isNaN(curr)||isNaN(liters)||liters<=0||curr<=prev){toast("تأكد من صحة القراءات (الحالية أكبر من السابقة)","⚠️");return;}
    var cap=tankCapFor(ST_selV.p);
    if(liters>cap){toast("الكمية ("+fmt(liters,0)+" لتر) تتجاوز السعة المتوقعة لهذا النوع (~"+cap+" لتر) — تأكد من الرقم أو تواصل مع المشرف","⚠️");return;}
    sb.disabled=true;sb.textContent="جارٍ الحفظ...";
    var c=calcE(ST_selV.p,prev,curr,liters);
    var entry={plate:ST_selV.p,date:new Date().toISOString().slice(0,10),time:new Date().toTimeString().slice(0,5),prev:prev,curr:curr,liters:liters,station:station,notes:notes,driverName:ST_drvName,ar:c.ar,dev:c.dev,st:c.st,sl:c.sl,ref:c.ref,un:c.un,reviewed:false};
    /* Random spot-check: even "normal" entries get pulled for review sometimes,
       so a driver can't learn the deviation thresholds and stay just under them. */
    if(c.st==="green"&&Math.random()<0.1)entry.spot=true;
    var photos={prev:ST_capturedPhotos.iPr||null,curr:ST_capturedPhotos.iCr||null};
    saveLog(entry,photos,function(ok){
      if(!ok){toast("تعذّر الحفظ","❌");sb.disabled=false;sb.textContent="✅ تسجيل العملية";return;}
      toast("تم التسجيل بنجاح","✅");
      ST_lastReading={lastCurr:curr,lastDate:entry.date,lastTime:entry.time,lastDriverName:entry.driverName};
      ST_capturedPhotos={};
      var ra=document.getElementById("rA");
      if(ra){var mp2={green:{ic:"🟢",t:"استهلاك طبيعي",d:"قريب من المعدل المرجعي. ممتاز!"},yellow:{ic:"🟡",t:"انحراف بسيط",d:"ضمن النطاق المقبول."},orange:{ic:"🟠",t:"يحتاج مراجعة",d:"سيراجعه المشرف."},red:{ic:"🔴",t:"إهدار أو خطأ",d:"تأكد من الأرقام."},gray:{ic:"ℹ️",t:"تم التسجيل",d:"لا يوجد معدل مرجعي."}};var mx=mp2[c.st]||mp2.gray;ra.innerHTML='<div class="rtoast '+(c.st==="gray"?"green":c.st)+'"><div style="font-size:22px">'+mx.ic+'</div><div><div class="rtoast-t">'+mx.t+'</div><div class="rtoast-d">'+mx.d+(c.ar?" · معدلك: "+fmt(c.ar,2)+" مقابل "+fmt(c.ref,2):"")+"</div></div></div>";}
      var iCr=document.getElementById("iCr"),iL=document.getElementById("iL"),iNo=document.getElementById("iNo");
      if(iCr)iCr.value="";if(iL)iL.value="";if(iNo)iNo.value="";
      sb.disabled=false;sb.textContent="✅ تسجيل العملية";
    });
  };}
}
