  var keys=lk("fl:");
  return keys.map(function(k){var r=lg(k);try{return r?JSON.parse(r):null;}catch(e){return null;}}).filter(Boolean)
    .sort(function(a,b){return new Date(b.date+"T"+(b.time||"00:00"))-new Date(a.date+"T"+(a.time||"00:00"));});
}
function saveLog(e,cb){
  ls("fl:"+e.id,JSON.stringify(e));
  if(fbReady&&fbDB){fbDB.ref("logs/"+e.id).set(e).then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});}
  else{if(cb)cb(true);}
}
function patchLog(e){ls("fl:"+e.id,JSON.stringify(e));if(fbReady&&fbDB)fbDB.ref("logs/"+e.id).set(e);}

function loadAdm(){
  var r=lg("adm");return r?JSON.parse(r):[];
}
function saveAdm(a){
  ls("adm",JSON.stringify(a));
  if(fbReady&&fbDB)fbDB.ref("admins").set(JSON.stringify(a));
  return true;
}
function loadRem(){var r=lg("rem");return r?JSON.parse(r):null;}
function saveRem(n,h){ls("rem",JSON.stringify({n:n,h:h}));}
function clearRem(){ld("rem");}
function getOp(){return lg("op")||"";}
function setOp(v){ls("op",v);}
function loadOv(){var r=lg("ov");return r?JSON.parse(r):{a:[],d:[]};}
function saveOv(o){ls("ov",JSON.stringify(o));if(fbReady&&fbDB)fbDB.ref("fleetOv").set(JSON.stringify(o));applyOv(o);}
function applyOv(o){var d=new Set(o.d||[]);AF=FD.filter(function(v){return !d.has(v.p);}).concat(o.a||[]);ri();}

/* ── Utils ── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function hp(pw){var h=0,s="wq_"+pw;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return "h"+Math.abs(h).toString(36);}
function fmt(n,d){if(n==null||isNaN(n))return "—";d=d==null?1:d;return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function pct(n,d){if(n==null||isNaN(n))return "—";d=d==null?1:d;return(n*100).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})+"%";}
function toast(m,ic){var el=document.getElementById("T");el.innerHTML="<span>"+(ic||"✅")+"</span><span>"+m+"</span>";el.style.display="flex";clearTimeout(window._tt);window._tt=setTimeout(function(){el.style.display="none";},2500);}
function es(ic,t,s){return '<div class="es"><span class="ei">'+ic+'</span><div class="et">'+t+"</div>"+(s?'<div style="font-size:11px;margin-top:4px">'+s+"</div>":"")+"</div>";}
function calcE(plate,prev,curr,liters){
  var v=FP[plate],ref=RM[v&&v.u],diff=curr-prev,ar=null,dev=null;
  if(diff>0&&liters>0&&ref){if(ref.u==="km"){ar=diff/liters;dev=(ref.t-ar)/ref.t;}else{ar=liters/diff;dev=(ar-ref.t)/ref.t;}}
  var st="gray",sl="—";
  if(dev!=null){var a=Math.abs(dev);if(a<=0.05){st="green";sl="طبيعي";}else if(a<=0.2){st="yellow";sl="انحراف بسيط";}else if(a<=0.4){st="orange";sl="يحتاج مراجعة";}else{st="red";sl="إهدار / خطأ";}}
  return {diff:diff,ar:ar,dev:dev,st:st,sl:sl,ref:ref?ref.t:null,un:ref?ref.u:null};
}
function lastR(plate){
  var e=loadLogs().filter(function(l){return l.plate===plate;}).sort(function(a,b){return b.curr-a.curr;});
  return e.length?e[0].curr:null;
}

/* ── Auth ── */
function rAuth(admins){
  var el=document.getElementById("A"),noOwner=admins.length===0;
  var rem=loadRem(),rm=null;
  if(rem&&!noOwner)for(var i=0;i<admins.length;i++){if(admins[i].n===rem.n&&admins[i].h===rem.h){rm=admins[i];break;}}
  if(rm&&!ST_forceL){
    el.innerHTML='<div class="gate"><div class="gc"><div class="ac">'+
      '<div class="at">مرحباً، '+rm.n+'</div>'+
      '<div class="as">هذا الجهاز محفوظ لحسابك '+(rm.isOwner?"(المالك)":"(مشرف)")+'.</div>'+
      '<button class="sb" id="btnQL">متابعة كـ '+rm.n+' →</button>'+
      '<button class="bk" onclick="goForce()">حساب آخر</button>'+
      '<button style="background:none;border:none;color:var(--fn);font-size:11px;cursor:pointer;margin-top:7px;width:100%" onclick="goClearRem()">هذا ليس جهازي — مسح</button>'+
      '</div></div></div>';
    document.getElementById("btnQL").onclick=function(){ST_admin=rm;ST_role=rm.isOwner?"owner":"admin";ST_page="dash";render();};
    return;
  }
  var isOw=ST_target==="owner";
  el.innerHTML='<div class="gate"><div class="gc"><div class="ac">'+
    '<div class="at">'+(noOwner?"إعداد حساب المالك":isOw?"دخول المالك":"دخول المشرف")+'</div>'+
    '<div class="as">'+(noOwner?"أول دخول — أنشئ حساب المالك.":"أدخل بياناتك للدخول.")+'</div>'+
    '<div class="fl"><label>الاسم</label><input type="text" id="iN" placeholder="'+(noOwner?"مثال: منصور الدوسري":"اسمك")+'"></div>'+
    '<div class="fl"><label>كلمة المرور</label><input type="password" id="iP"></div>'+
    (noOwner?'<div class="fl"><label>تأكيد كلمة المرور</label><input type="password" id="iP2"></div>'+
    '<div class="cw"><label>🔑 كود الإعداد السري</label><input type="password" id="iC" placeholder="أدخل الكود السري"></div>':"")+
    '<label class="rl"><input type="checkbox" id="iRm" checked> احفظ بيانات الدخول على هذا الجهاز</label>'+
    '<div class="ae" id="iE"></div>'+
    '<button class="sb" id="btnGo">'+(noOwner?"إنشاء الحساب والدخول":"دخول →")+'</button>'+
    '<button class="bk" onclick="goBack()">رجوع</button>'+
    '</div></div></div>';
  function go(){
    var name=(document.getElementById("iN").value||"").trim();
    var pass=document.getElementById("iP").value||"";
    var errEl=document.getElementById("iE");
    errEl.textContent="";
    if(!name){errEl.textContent="❌ الرجاء إدخال الاسم";return;}
    if(pass.length<4){errEl.textContent="❌ كلمة المرور 4 أحرف على الأقل";return;}
    var remCk=document.getElementById("iRm").checked;
    var h=hp(pass),adms=loadAdm();
    if(adms.length===0){
      var p2=(document.getElementById("iP2")||{value:""}).value||"";
      var code=(document.getElementById("iC")||{value:""}).value.trim();
      if(pass!==p2){errEl.textContent="❌ كلمتا المرور غير متطابقتين";return;}
      if(hp(code)!==MC_HASH){errEl.textContent="❌ كود الإعداد غير صحيح";return;}
      var owner={id:uid(),n:name,h:h,isOwner:true,dt:new Date().toISOString().slice(0,10)};
      if(!saveAdm([owner])){errEl.textContent="❌ تعذّر الحفظ";return;}
      if(remCk)saveRem(name,h);else clearRem();
      ST_admin=owner;ST_role="owner";ST_page="dash";ST_forceL=false;
      toast("تم إنشاء حساب المالك ✨","");render();
    } else {
      var match=null;
      for(var i=0;i<adms.length;i++){if(adms[i].n===name&&adms[i].h===h){match=adms[i];break;}}
      if(!match){errEl.textContent="❌ الاسم أو كلمة المرور غير صحيحة";return;}
      if(isOw&&!match.isOwner){errEl.textContent="❌ هذا الحساب ليس بصلاحية المالك";return;}
      if(remCk)saveRem(name,h);else clearRem();
      ST_admin=match;ST_role=match.isOwner?"owner":"admin";ST_page="dash";ST_forceL=false;
      toast("أهلاً "+name,"✅");render();
    }
  }
  document.getElementById("btnGo").onclick=go;
  document.getElementById("iP").addEventListener("keydown",function(e){if(e.key==="Enter")go();});
}

function renderPage(){

  else if(ST_page==="act")mp.innerHTML=pAct(logs);
  else if(ST_page==="drv")mp.innerHTML=pDrv(logs);

  else if(ST_page==="log"){mp.innerHTML=pLog();rLR();}

function agg(logs){
  var tot=0,vd=[],open=[],td=new Date().toISOString().slice(0,10),tr=new Set();
  for(var i=0;i<logs.length;i++){var l=logs[i];tot+=l.liters||0;if(l.dev!=null)vd.push(l.dev);if((l.st==="red"||l.st==="orange")&&!l.reviewed)open.push(l);tr.add(l.plate);}
  return{tot:tot,avg:vd.length?vd.reduce(function(a,b){return a+b;},0)/vd.length:null,open:open,td:logs.filter(function(l){return l.date===td;}).length,tr:tr.size};
}
function pDash(logs){
  var a=agg(logs),byP={};
  for(var i=0;i<logs.length;i++){var l=logs[i];if(l.dev==null)continue;if(!byP[l.plate])byP[l.plate]=[];byP[l.plate].push(l.dev);}
  var top=Object.keys(byP).map(function(p){var d=byP[p];return{p:p,avg:d.reduce(function(a,b){return a+b;},0)/d.length,n:d.length};}).sort(function(a,b){return b.avg-a.avg;}).slice(0,6);
  var r='<div class="ph"><h1>'+(ST_role==="owner"?"لوحة المالك":"لوحة التحكم")+'</h1><p>'+AF.length+" مركبة · "+logs.length+" عملية مسجّلة</p></div>";
  if(ST_role==="owner")r+='<div class="op"><h2>👑 وضع المالك</h2><p>'+(fbReady?"🟢 المزامنة الفورية مفعّلة — كل التعبئات تظهر هنا في الحال.":"🟠 وضع محلي — لتفعيل المزامنة: اقرأ التعليمات في الملف.")+"</p></div>";
  r+='<div class="kg"><div class="kc kcb"><div class="kb"></div><div class="kl">الأسطول</div><div class="kv">'+AF.length+'</div></div><div class="kc kca"><div class="kb"></div><div class="kl">التعبئات</div><div class="kv">'+logs.length+'</div><div class="ks">'+a.td+' اليوم</div></div><div class="kc kct"><div class="kb"></div><div class="kl">إجمالي اللترات</div><div class="kv">'+fmt(a.tot,0)+'</div></div><div class="kc kcr"><div class="kb"></div><div class="kl">تنبيهات</div><div class="kv">'+a.open.length+'</div></div></div>';
  r+='<div class="g2"><div class="card"><div class="ch"><h2>أعلى 6 مركبات إهداراً</h2></div>';
  if(!top.length)r+=es("📭","بانتظار أول تسجيلات","");
  else for(var i=0;i<top.length;i++){var o=top[i],v=FP[o.p];var c=Math.abs(o.avg)>0.4?"var(--rd)":Math.abs(o.avg)>0.2?"var(--og)":"var(--tl)";r+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--brd)"><div style="width:18px;text-align:center;font-size:10px;font-weight:700;color:var(--fn)">'+(i+1)+'</div><div style="flex:1"><div class="num" style="font-weight:700;font-size:12px">'+o.p+'</div><div style="font-size:10.5px;color:var(--dm)">'+(v?v.u:"")+" · "+o.n+' عملية</div></div><div class="num" style="font-weight:800;font-size:12px;color:'+c+'">'+(o.avg>=0?"+":"")+pct(o.avg)+"</div></div>";}
  r+='</div><div class="card"><div class="ch"><h2>آخر النشاط</h2></div>';
  if(!logs.length)r+=es("🚚","بانتظار التسجيلات","");
  else{var sl=logs.slice(0,7);for(var i=0;i<sl.length;i++){var l=sl[i];r+='<div class="rii"><div><div class="num" style="font-weight:700;font-size:12px">'+l.plate+'</div><div style="font-size:10.5px;color:var(--dm)">'+(l.driverName||"—")+" · "+l.date+'</div></div><div style="text-align:left"><div class="num" style="font-weight:700;font-size:12px">'+fmt(l.liters,1)+' L</div><span class="bg '+l.st+'">'+l.sl+"</span></div></div>";}}
  r+="</div></div>";return r;
}
function pAct(logs){
  var td=new Date().toISOString().slice(0,10),tl=logs.filter(function(l){return l.date===td;});
  var byD={};logs.forEach(function(l){var n=l.driverName||"—";if(!byD[n])byD[n]=[];byD[n].push(l);});
  var r='<div class="ph"><h1>📡 النشاط الحي</h1><p>'+td+" · "+tl.length+' عملية اليوم</p></div>';
  r+='<div class="card"><div class="ch"><h2>عمليات اليوم</h2></div>';
  if(!tl.length)r+=es("📋","لا توجد عمليات اليوم","");
  else{r+='<div class="tw"><table><thead><tr><th>الوقت</th><th>اللوحة</th><th>السائق</th><th>اللتر</th><th>الانحراف</th><th>الحالة</th></tr></thead><tbody>';for(var i=0;i<tl.length;i++){var l=tl[i];r+="<tr><td class='num'>"+(l.time||"—")+"</td><td class='num'>"+l.plate+"</td><td>"+(l.driverName||"—")+"</td><td class='num'>"+fmt(l.liters,1)+"</td><td class='num'>"+(l.dev!=null?(l.dev>=0?"+":"")+pct(l.dev):"—")+"</td><td><span class='bg "+l.st+"'>"+l.sl+"</span></td></tr>";}r+="</tbody></table></div>";}
  r+="</div>";
  var dkeys=Object.keys(byD).sort(function(a,b){return byD[b].length-byD[a].length;});
  r+='<div class="card"><div class="ch"><h2>ملخص السائقين</h2></div>';
  if(!dkeys.length)r+=es("👥","لا توجد بيانات","");
  else{r+='<div class="tw"><table><thead><tr><th>السائق</th><th>عمليات</th><th>لتر</th><th>متوسط انحراف</th></tr></thead><tbody>';for(var i=0;i<dkeys.length;i++){var n=dkeys[i],ls2=byD[n];var tot=ls2.reduce(function(s,l){return s+(l.liters||0);},0);var vd=ls2.filter(function(l){return l.dev!=null;});var ad=vd.length?vd.reduce(function(s,l){return s+l.dev;},0)/vd.length:null;r+="<tr><td><b>"+n+"</b></td><td class='num'>"+ls2.length+"</td><td class='num'>"+fmt(tot,0)+"</td><td class='num' style='color:"+(ad!=null&&Math.abs(ad)>0.2?"var(--og)":"var(--tl)")+"'>"+(ad!=null?pct(ad):"—")+"</td></tr>";}r+="</tbody></table></div>";}
  r+="</div>";return r;
}
function pDrv(logs){
  var by={};logs.forEach(function(l){var n=l.driverName||"—";if(!by[n])by[n]=[];by[n].push(l);});
  var ranked=Object.keys(by).map(function(n){var ls2=by[n];var vd=ls2.filter(function(l){return l.dev!=null;});var sc=vd.length?Math.abs(vd.reduce(function(a,b){return a+b.dev;},0)/vd.length):999;return{n:n,ls:ls2,sc:sc};}).sort(function(a,b){return a.sc-b.sc;});

    (v?
    '<div class="fr">'+
    '<div class="fl"><label>القراءة السابقة ('+(ref&&ref.u==="hr"?"ساعة":"كم")+') '+camBtn("iPr")+'</label><input type="number" id="iPr" value="'+(lRv!=null?lRv:"")+'" placeholder="'+(lRv!=null?lRv:"أدخل القراءة")+'"></div>'+
    '<div class="fl"><label>القراءة الحالية '+camBtn("iCr")+'</label><input type="number" id="iCr" placeholder="القراءة الآن"></div></div>'+
    '<div class="fr">'+
    '<div class="fl"><label>الوقود (لتر)</label><input type="number" id="iL" placeholder="مثال: 65"></div>'+
    '<div class="fl"><label>المحطة / الموقع</label><input type="text" id="iSt" placeholder="اسم المحطة"></div></div>'+
    '<div class="fl"><label>ملاحظات (اختياري)</label><textarea id="iNo" rows="2" placeholder="أي ملاحظة..."></textarea></div>'+
    '<button class="sb" id="btnSb">✅ تسجيل العملية</button><div id="rA"></div>'
    :'<div class="es"><span class="ei">🔍</span><div class="et">ابحث عن مركبتك</div></div>')+
    "</div>"+recent;

  /* Camera buttons */
  document.querySelectorAll(".cam-btn").forEach(function(btn){
    btn.addEventListener("click",function(){openCamera(this.dataset.field);});
  });

  /* Plate search */
  var psi=document.getElementById("pS");
  if(psi){
    psi.oninput=function(){
      var q=this.value.trim(),rb=document.getElementById("vR");if(!rb)return;
      if(!q){rb.style.display="none";return;}
      var matches=[];for(var i=0;i<AF.length&&matches.length<25;i++){if(AF[i].p.includes(q))matches.push(AF[i]);}
      if(!matches.length){rb.innerHTML='<div class="vr">لا نتائج</div>';rb.style.display="block";return;}
      var h="";for(var i=0;i<matches.length;i++){h+='<div class="vr" data-pvp="'+matches[i].p+'"><b>'+matches[i].p+'</b><span>'+matches[i].u+" · "+(matches[i].m||"")+"</span></div>";}
      rb.innerHTML=h;rb.style.display="block";
      rb.querySelectorAll("[data-pvp]").forEach(function(el){el.addEventListener("click",function(){ST_selV=FP[this.dataset.pvp];rb.style.display="none";render();});});
    };
    psi.addEventListener("focus",function(){if(this.value.trim())this.dispatchEvent(new Event("input"));});
  }
  document.addEventListener("click",function(e){if(!e.target.closest(".vp")&&!e.target.closest(".cam-btn")){var r=document.getElementById("vR");if(r)r.style.display="none";}},{once:true});

  /* Submit */
  var sb=document.getElementById("btnSb");
  if(sb&&v){sb.onclick=function(){
    var prev=parseFloat((document.getElementById("iPr")||{value:""}).value);
    var curr=parseFloat((document.getElementById("iCr")||{value:""}).value);
    var liters=parseFloat((document.getElementById("iL")||{value:""}).value);
    var station=(document.getElementById("iSt")||{value:""}).value;
    var notes=(document.getElementById("iNo")||{value:""}).value;
    if(isNaN(prev)||isNaN(curr)||isNaN(liters)||liters<=0||curr<=prev){toast("تأكد من صحة القراءات (الحالية أكبر من السابقة)","⚠️");return;}
    sb.disabled=true;sb.textContent="جارٍ الحفظ...";
    var c=calcE(ST_selV.p,prev,curr,liters);
    var entry={id:uid(),plate:ST_selV.p,date:new Date().toISOString().slice(0,10),time:new Date().toTimeString().slice(0,5),prev:prev,curr:curr,liters:liters,station:station,notes:notes,driverName:ST_drvName,ar:c.ar,dev:c.dev,st:c.st,sl:c.sl,ref:c.ref,un:c.un,reviewed:false};
    saveLog(entry,function(ok){
      if(!ok){toast("تعذّر الحفظ","❌");sb.disabled=false;sb.textContent="✅ تسجيل العملية";return;}
      toast("تم التسجيل بنجاح","✅");
      var ra=document.getElementById("rA");
      if(ra){var mp2={green:{ic:"🟢",t:"استهلاك طبيعي",d:"قريب من المعدل المرجعي. ممتاز!"},yellow:{ic:"🟡",t:"انحراف بسيط",d:"ضمن النطاق المقبول."},orange:{ic:"🟠",t:"يحتاج مراجعة",d:"سيراجعه المشرف."},red:{ic:"🔴",t:"إهدار أو خطأ",d:"تأكد من الأرقام."},gray:{ic:"ℹ️",t:"تم التسجيل",d:"لا يوجد معدل مرجعي."}};var mx=mp2[c.st]||mp2.gray;ra.innerHTML='<div class="rtoast '+(c.st==="gray"?"green":c.st)+'"><div style="font-size:22px">'+mx.ic+'</div><div><div class="rtoast-t">'+mx.t+'</div><div class="rtoast-d">'+mx.d+(c.ar?" · معدلك: "+fmt(c.ar,2)+" مقابل "+fmt(c.ref,2):"")+"</div></div></div>";}
      var iCr=document.getElementById("iCr"),iL=document.getElementById("iL"),iNo=document.getElementById("iNo");
      if(iCr)iCr.value="";if(iL)iL.value="";if(iNo)iNo.value="";
      sb.disabled=false;sb.textContent="✅ تسجيل العملية";
    });
  };}
}

/* ── Init ── */
window.addEventListener("DOMContentLoaded",function(){
  var ov=loadOv();applyOv(ov);
  ST_opName=getOp();ST_drvName=ST_opName;
  initFB();
  render();
});

</script>
</body></html>
